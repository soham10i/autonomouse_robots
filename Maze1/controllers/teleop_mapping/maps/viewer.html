<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLY Point Cloud Viewer — scene.ply</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
  }

  #canvas-container {
    position: absolute;
    inset: 0;
  }

  /* ── HUD overlay ── */
  #hud {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
  }
  #hud > * { pointer-events: auto; }

  .panel {
    background: rgba(14, 14, 26, 0.82);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 18px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #8b8bff;
    margin-bottom: 8px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 2px 0;
  }
  .stat-row .label { color: #888; }
  .stat-row .value { color: #ddd; font-variant-numeric: tabular-nums; }

  /* controls panel */
  #controls-panel {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 10;
    width: 220px;
  }
  .slider-group { margin-bottom: 10px; }
  .slider-group label {
    display: block;
    font-size: 11px;
    color: #999;
    margin-bottom: 4px;
  }
  .slider-group input[type="range"] {
    width: 100%;
    accent-color: #7c6aff;
  }
  .btn-row { display: flex; gap: 6px; margin-top: 8px; }
  .btn {
    flex: 1;
    padding: 7px 0;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    color: #ccc;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .btn:hover { background: rgba(124,106,255,0.2); border-color: #7c6aff; color: #fff; }
  .btn.active { background: rgba(124,106,255,0.35); border-color: #7c6aff; color: #fff; }

  /* legend */
  #legend {
    position: fixed;
    bottom: 16px;
    left: 16px;
    z-index: 10;
  }
  #legend .row {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: #999; padding: 2px 0;
  }
  #legend .dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
  }

  /* loading overlay */
  #loading {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a12;
    flex-direction: column;
    gap: 16px;
    transition: opacity 0.5s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid rgba(124,106,255,0.15);
    border-top-color: #7c6aff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: #888; font-size: 14px; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p id="load-status">Loading scene.ply …</p>
</div>

<div id="canvas-container"></div>

<div id="hud">
  <div class="panel" id="info-panel">
    <h2>Point Cloud</h2>
    <div class="stat-row"><span class="label">Vertices</span><span class="value" id="st-verts">—</span></div>
    <div class="stat-row"><span class="label">X range</span><span class="value" id="st-xr">—</span></div>
    <div class="stat-row"><span class="label">Y range</span><span class="value" id="st-yr">—</span></div>
    <div class="stat-row"><span class="label">Z range</span><span class="value" id="st-zr">—</span></div>
  </div>
</div>

<div id="controls-panel" class="panel">
  <h2>View Controls</h2>
  <div class="slider-group">
    <label>Point size: <span id="ps-val">2.0</span></label>
    <input type="range" id="point-size" min="0.5" max="8" step="0.25" value="2.0">
  </div>
  <div class="slider-group">
    <label>Z-clip max: <span id="zc-val">all</span></label>
    <input type="range" id="z-clip" min="0" max="100" step="1" value="100">
  </div>
  <div class="btn-row">
    <button class="btn active" id="btn-top" title="Top-down view">Top</button>
    <button class="btn" id="btn-front" title="Front view">Front</button>
    <button class="btn" id="btn-side" title="Side view">Side</button>
    <button class="btn" id="btn-persp" title="3D perspective">3D</button>
  </div>
  <div class="btn-row">
    <button class="btn" id="btn-grid" title="Toggle grid">Grid ✓</button>
    <button class="btn" id="btn-axes" title="Toggle axes helper">Axes ✓</button>
  </div>
</div>

<div id="legend" class="panel">
  <h2>Height legend</h2>
  <div class="row"><div class="dot" style="background:#0000e0"></div> Low (floor)</div>
  <div class="row"><div class="dot" style="background:#00cfff"></div> Mid-low</div>
  <div class="row"><div class="dot" style="background:#a0ff5a"></div> Mid</div>
  <div class="row"><div class="dot" style="background:#ffb300"></div> Mid-high</div>
  <div class="row"><div class="dot" style="background:#ff0000"></div> High (ceiling)</div>
  <div style="font-size:10px;color:#666;margin-top:6px">
    Drag to orbit · Scroll to zoom · Right-drag to pan
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ── renderer ── */
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x0a0a12);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.05, 500);
camera.position.set(0, 0, 12);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.12;
controls.rotateSpeed = 0.6;

/* ── helpers ── */
const gridHelper = new THREE.GridHelper(20, 40, 0x333355, 0x1a1a2e);
gridHelper.rotation.x = Math.PI / 2;   // XY plane
scene.add(gridHelper);

const axesHelper = new THREE.AxesHelper(2);
scene.add(axesHelper);

/* ── state ── */
let pointsMesh = null;
let allPositions = null;
let allColors = null;
let zMin = 0, zMax = 1;

/* ── load PLY ── */
async function loadPLY() {
  const status = document.getElementById('load-status');
  status.textContent = 'Fetching scene.ply …';

  const resp = await fetch('scene.ply');
  const text = await resp.text();

  status.textContent = 'Parsing vertices …';
  await new Promise(r => setTimeout(r, 30));  // let the UI repaint

  const lines = text.split('\n');
  let headerEnd = 0;
  let vertexCount = 0;

  for (let i = 0; i < lines.length; i++) {
    const l = lines[i].trim();
    if (l.startsWith('element vertex')) vertexCount = parseInt(l.split(/\s+/)[2]);
    if (l === 'end_header') { headerEnd = i + 1; break; }
  }

  const positions = new Float32Array(vertexCount * 3);
  const colors = new Float32Array(vertexCount * 3);

  let _zMin = Infinity, _zMax = -Infinity;
  let xMin = Infinity, xMax = -Infinity;
  let yMin = Infinity, yMax = -Infinity;

  for (let i = 0; i < vertexCount; i++) {
    const parts = lines[headerEnd + i].trim().split(/\s+/);
    const x = parseFloat(parts[0]);
    const y = parseFloat(parts[1]);
    const z = parseFloat(parts[2]);
    const r = parseInt(parts[3]) / 255;
    const g = parseInt(parts[4]) / 255;
    const b = parseInt(parts[5]) / 255;

    positions[i * 3]     = x;
    positions[i * 3 + 1] = y;
    positions[i * 3 + 2] = z;
    colors[i * 3]     = r;
    colors[i * 3 + 1] = g;
    colors[i * 3 + 2] = b;

    if (x < xMin) xMin = x; if (x > xMax) xMax = x;
    if (y < yMin) yMin = y; if (y > yMax) yMax = y;
    if (z < _zMin) _zMin = z; if (z > _zMax) _zMax = z;
  }

  zMin = _zMin;
  zMax = _zMax;
  allPositions = positions;
  allColors = colors;

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

  const material = new THREE.PointsMaterial({
    size: 2.0,
    vertexColors: true,
    sizeAttenuation: false,
    transparent: true,
    opacity: 0.92
  });

  pointsMesh = new THREE.Points(geometry, material);
  scene.add(pointsMesh);

  // center the camera target
  const cx = (xMin + xMax) / 2;
  const cy = (yMin + yMax) / 2;
  const cz = (_zMin + _zMax) / 2;
  controls.target.set(cx, cy, cz);

  const extent = Math.max(xMax - xMin, yMax - yMin, _zMax - _zMin);
  camera.position.set(cx, cy, cz + extent * 1.3);
  controls.update();

  // update HUD
  document.getElementById('st-verts').textContent = vertexCount.toLocaleString();
  document.getElementById('st-xr').textContent = `${xMin.toFixed(2)} → ${xMax.toFixed(2)}`;
  document.getElementById('st-yr').textContent = `${yMin.toFixed(2)} → ${yMax.toFixed(2)}`;
  document.getElementById('st-zr').textContent = `${_zMin.toFixed(2)} → ${_zMax.toFixed(2)}`;

  // hide loader
  document.getElementById('loading').classList.add('hidden');
}

loadPLY();

/* ── controls wiring ── */
const psSlider = document.getElementById('point-size');
const zcSlider = document.getElementById('z-clip');

psSlider.addEventListener('input', () => {
  const v = parseFloat(psSlider.value);
  document.getElementById('ps-val').textContent = v.toFixed(1);
  if (pointsMesh) pointsMesh.material.size = v;
});

zcSlider.addEventListener('input', () => {
  const pct = parseInt(zcSlider.value);
  if (pct >= 100) {
    document.getElementById('zc-val').textContent = 'all';
    if (pointsMesh) {
      const geom = pointsMesh.geometry;
      geom.setAttribute('position', new THREE.BufferAttribute(allPositions, 3));
      geom.setAttribute('color',    new THREE.BufferAttribute(allColors, 3));
      geom.setDrawRange(0, allPositions.length / 3);
    }
    return;
  }
  const clipZ = zMin + (zMax - zMin) * (pct / 100);
  document.getElementById('zc-val').textContent = clipZ.toFixed(2) + ' m';

  // rebuild visible set
  const n = allPositions.length / 3;
  const pos = [];
  const col = [];
  for (let i = 0; i < n; i++) {
    if (allPositions[i * 3 + 2] <= clipZ) {
      pos.push(allPositions[i*3], allPositions[i*3+1], allPositions[i*3+2]);
      col.push(allColors[i*3], allColors[i*3+1], allColors[i*3+2]);
    }
  }
  const geom = pointsMesh.geometry;
  geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pos), 3));
  geom.setAttribute('color',    new THREE.BufferAttribute(new Float32Array(col), 3));
});

/* view buttons */
function setView(pos, up) {
  const t = controls.target.clone();
  camera.position.set(t.x + pos[0], t.y + pos[1], t.z + pos[2]);
  camera.up.set(up[0], up[1], up[2]);
  controls.update();
}

document.getElementById('btn-top').addEventListener('click', () => {
  setView([0, 0, 12], [0, 1, 0]);
  setActive('btn-top');
});
document.getElementById('btn-front').addEventListener('click', () => {
  setView([0, -12, 0], [0, 0, 1]);
  setActive('btn-front');
});
document.getElementById('btn-side').addEventListener('click', () => {
  setView([12, 0, 0], [0, 0, 1]);
  setActive('btn-side');
});
document.getElementById('btn-persp').addEventListener('click', () => {
  setView([8, -6, 5], [0, 0, 1]);
  setActive('btn-persp');
});

function setActive(id) {
  document.querySelectorAll('.btn-row:first-of-type .btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

let gridOn = true, axesOn = true;
document.getElementById('btn-grid').addEventListener('click', (e) => {
  gridOn = !gridOn;
  gridHelper.visible = gridOn;
  e.target.textContent = gridOn ? 'Grid ✓' : 'Grid';
  e.target.classList.toggle('active', gridOn);
});
document.getElementById('btn-axes').addEventListener('click', (e) => {
  axesOn = !axesOn;
  axesHelper.visible = axesOn;
  e.target.textContent = axesOn ? 'Axes ✓' : 'Axes';
  e.target.classList.toggle('active', axesOn);
});

/* ── resize ── */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ── render loop ── */
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
